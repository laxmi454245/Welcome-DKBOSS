<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKBOSS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#eef0f5;
}

.alertBar{
    width:100%;
    height:45px;
    background:#000;
    overflow:hidden;
    position:relative;
    display:flex;
    align-items:center;
}

.alertText{
    position:absolute;
    white-space:nowrap;
    color:red;
    font-size:18px;
    font-weight:bold;
    animation:rightToLeft 15s linear infinite;
}

@keyframes rightToLeft{

    0%{
        transform:translateX(100vw);
    }

    100%{
        transform:translateX(-100%);
    }

}

.main{
    min-height:calc(100vh - 45px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:92%;
    max-width:650px;
    background:#fff;
    border-radius:24px;
    padding:40px 25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.welcome{
    font-size:30px;
    color:#4b4df0;
    font-weight:bold;
    margin-bottom:20px;
}

.btn{
    background:#4b4df0;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:14px 40px;
    cursor:pointer;
}

.hidden{
    display:none;
}

.spinner{
    width:60px;
    height:60px;
    border:5px solid #ddd;
    border-top:5px solid #4b4df0;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.token{
    background:#f4f4f4;
    padding:15px;
    border-radius:10px;
    margin:15px 0;
    word-break:break-all;
}

.timer{
    margin-top:10px;
    color:#4b4df0;
    font-weight:bold;
}

.status{
    margin-top:10px;
    color:green;
}

</style>
</head>
<body>

<div class="alertBar">
    <div class="alertText" id="alertText"></div>
</div>

<div class="main">

<div class="card">

    <div class="welcome">
        Welcome DKBOSS
    </div>

    <div id="loginSection">
        <button class="btn" onclick="startLogin()">
            Login
        </button>
    </div>

    <div id="loadingSection" class="hidden">
        <div class="spinner"></div>
        <h3>Loading Code...</h3>
    </div>

    <div id="tokenSection" class="hidden">

        <div id="tokenBox" class="token"></div>

        <button class="btn" onclick="copyToken()">
            Copy Token
        </button>

        <div id="timer" class="timer"></div>

        <br>

        <button class="btn" onclick="openTelegram()">
            Verify
        </button>

        <div id="status" class="status"></div>

    </div>

</div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
