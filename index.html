<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKBOSS Admin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#eef0f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:92%;
    max-width:650px;
    background:#fff;
    border-radius:24px;
    padding:45px 25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.10);
}

.titleBox{
    margin-bottom:30px;
}

.welcome{
    font-size:30px;
    font-weight:700;
    color:#4b4df0;
    animation:floatText 2s ease-in-out infinite;
}

@keyframes floatText{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-5px);
    }
}

.btn{
    background:#4b4df0;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:14px 45px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(75,77,240,.3);
}

.btn:disabled{
    opacity:.5;
    cursor:not-allowed;
}

.hidden{
    display:none;
}

.spinner{
    width:65px;
    height:65px;
    border:5px solid #ddd;
    border-top:5px solid #4b4df0;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.tokenWrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin:20px 0;
}

.token{
    flex:1;
    background:#f4f4f4;
    padding:14px;
    border-radius:12px;
    font-family:monospace;
    font-size:14px;
    font-weight:bold;
    text-align:left;
    white-space:nowrap;
    overflow-x:auto;
    cursor:pointer;
}

.copyIcon{
    width:50px;
    height:50px;
    border:none;
    border-radius:12px;
    background:#4b4df0;
    color:#fff;
    font-size:20px;
    cursor:pointer;
}

.actionRow{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-top:10px;
}

.timer{
    font-size:18px;
    font-weight:bold;
    color:#4b4df0;
}

.version{
    margin-top:20px;
    color:#4b4df0;
    font-size:20px;
}

.status{
    margin-top:12px;
    color:green;
    min-height:20px;
    font-size:14px;
}

</style>
</head>
<body>

<div class="card">

    <div class="titleBox">
        <div class="welcome">
            Welcome DKB0SS
        </div>
    </div>

    <!-- LOGIN -->

    <div id="loginSection">

        <button class="btn" onclick="startLogin()">
            Login
        </button>

    </div>

    <!-- LOADING -->

    <div id="loadingSection" class="hidden">

        <div class="spinner"></div>

        <h3 style="color:#777;">
            Loading Code...
        </h3>

    </div>

    <!-- TOKEN SECTION -->

    <div id="tokenSection" class="hidden">

        <div class="tokenWrap">

            <div id="tokenBox"
                 class="token"
                 onclick="copyToken()">
            </div>

            <button class="copyIcon"
                    onclick="copyToken()">
                📋
            </button>

        </div>

        <div class="actionRow">

            <button class="btn"
                    id="verifyBtn"
                    onclick="openTelegram()">
                Verify
            </button>

            <span id="timer"
                  class="timer">
                60s
            </span>

        </div>

        <button class="btn hidden"
                id="regenBtn"
                onclick="regenerateToken()"
                style="margin-top:15px;">
            Re Generate Token
        </button>

        <div id="status"
             class="status">
        </div>

    </div>

    <div class="version">
        v3.0
    </div>

</div>

<script>

let currentToken = "";
let countdown;
let timeLeft = 60;
let tokenExpired = false;

/* LOGIN */

function startLogin(){

    document.getElementById("loginSection")
    .style.display = "none";

    document.getElementById("loadingSection")
    .classList.remove("hidden");

    setTimeout(function(){

        document.getElementById("loadingSection")
        .classList.add("hidden");

        document.getElementById("tokenSection")
        .classList.remove("hidden");

        generateToken();

    },3000);

}

/* TOKEN GENERATE */

function generateToken(){

    const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789$&#@?";

    currentToken = "";

    for(let i=0;i<40;i++){

        currentToken += chars.charAt(
            Math.floor(Math.random()*chars.length)
        );

    }

    document.getElementById("tokenBox")
    .innerText = currentToken;

    startTimer();

}

/* TIMER */

function startTimer(){

    clearInterval(countdown);

    timeLeft = 60;
    tokenExpired = false;

    document.getElementById("timer")
    .innerText = "60s";

    document.getElementById("verifyBtn")
    .disabled = false;

    document.getElementById("regenBtn")
    .classList.add("hidden");

    countdown = setInterval(function(){

        timeLeft--;

        document.getElementById("timer")
        .innerText = timeLeft + "s";

        if(timeLeft <= 0){

            clearInterval(countdown);

            tokenExpired = true;

            document.getElementById("timer")
            .innerText = "Expired";

            document.getElementById("verifyBtn")
            .disabled = true;

            document.getElementById("regenBtn")
            .classList.remove("hidden");

            document.getElementById("status")
            .innerText = "Token Expired";

        }

    },1000);

}

/* COPY TOKEN */

function copyToken(){

    navigator.clipboard.writeText(currentToken);

    const btn =
    document.querySelector(".copyIcon");

    btn.innerHTML = "✓";

    document.getElementById("status")
    .innerText = "Token Copied";

    setTimeout(function(){

        btn.innerHTML = "📋";

    },1500);

}

/* TELEGRAM */

function openTelegram(){

    if(tokenExpired){

        document.getElementById("status")
        .innerText =
        "Token Expired. Generate New Token.";

        return;

    }

    navigator.clipboard.writeText(currentToken);

    document.getElementById("status")
    .innerText =
    "Token Copied. Opening Telegram...";

    window.location.href =
    "tg://resolve?domain=pujawachhori";

    setTimeout(function(){

        window.location.href =
        "https://t.me/pujawachhori";

    },1000);

}

/* REGENERATE */

function regenerateToken(){

    generateToken();

    document.getElementById("status")
    .innerText =
    "New Token Generated";

}

</script>

</body>
</html>
